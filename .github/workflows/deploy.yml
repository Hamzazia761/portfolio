name: Deploy to Kapture

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-kapture
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          DEPLOY_KEY: ${{ secrets.KAPTURE_DEPLOYER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pinned host public keys for 72.62.4.70 (public, not secret — no ssh-keyscan at runtime).
          printf '%s\n' '72.62.4.70 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIFpVuu4E+SO2yPSOikJ7U7KwGfdtdf7LIdGbbELQhGl' > ~/.ssh/known_hosts
          printf '%s\n' '72.62.4.70 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBLavqQVGjZJZ4mzoTW0hR8aLkL8TSDcrdxsCLKN6lsvUasQdjVZuJcVJFiDxneU/+GS51c/orWxQ/QUEnk7G7vI=' >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          echo "key bytes: $(wc -c < ~/.ssh/id_ed25519), known_hosts lines: $(wc -l < ~/.ssh/known_hosts)"

      # The deploy key is locked on the host to a forced rrsync command
      # (rrsync -munge -wo /home/deployer/hamza-portfolio/site), so this push
      # can only write under site/ — no shell, no docker, no other service.
      # The dest "deployer@HOST:./" lands in the rrsync jail root = that site dir.
      - name: Deploy site (rsync into rrsync jail)
        run: |
          rsync -az --delete --chmod=D755,F644 \
            -e "ssh -i $HOME/.ssh/id_ed25519 -o IdentitiesOnly=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'deploy' \
            --exclude 'README.md' \
            --exclude 'assets/background.gif' \
            --exclude 'assets/background_gif.gif' \
            --exclude 'assets/background1.jpg' \
            ./ deployer@72.62.4.70:./
